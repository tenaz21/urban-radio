<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio Perú</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

.logo{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#ffd000,#00ff66,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card{
  background:#181818;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:15px;
}

button{
  background:#00ff66;
  border:none;
  padding:10px;
  border-radius:50%;
}

#yt{
  width:100%;
  height:220px;
  border:none;
}
</style>
</head>

<body>

<div class="logo">🎧 URBAN RADIO PERÚ 🇵🇪</div>

<!-- RADIOS -->
<div class="grid">
<div class="card" onclick="playRadio('los40')">LOS40</div>
<div class="card" onclick="playRadio('rpp')">RPP</div>
<div class="card" onclick="playRadio('exitosa')">Exitosa</div>
</div>

<!-- YOUTUBE PLAYER -->
<div class="logo" style="font-size:20px;">🎤 NORICK</div>

<div id="player"></div>

<div class="player">

<div id="title">Selecciona canción</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>

</div>

<audio id="audio"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* RADIOS */
let audio=document.getElementById("audio");

const radios={
los40:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
rpp:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC",
exitosa:"https://cu.onliv3.com/live/exitosa.mp3"
};

function playRadio(r){
 audio.src=radios[r];
 audio.play();
 document.getElementById("title").innerText="▶ "+r;
}

/* NORICK PLAYLIST (VIDEOS REALES) */
const playlist=[
"5pJY6Y9g9I0",
"0KSOMA3QBU0",
"fLexgOxsZu0",
"3JZ4pnNtyxQ",
"Zi_XLOBDo_Y",
"2Vv-BfVoq4g",
"ktvTqknDobU",
"RgKAFK5djSk",
"OPf0YbXqDm0",
"09R8_2nJtjg"
];

let player;
let index=0;

/* YOUTUBE INIT */
function onYouTubeIframeAPIReady(){
 player=new YT.Player('player',{
  height:'220',
  width:'100%',
  videoId:playlist[index],
  playerVars:{'autoplay':0},
  events:{
    'onReady':()=>{}
  }
 });
}

/* CONTROLES */
function playYT(){
 player.playVideo();
}

function pauseYT(){
 player.pauseVideo();
}

function toggle(){
 let state=player.getPlayerState();
 if(state==1){
  player.pauseVideo();
 }else{
  player.playVideo();
 }
}

function next(){
 index++;
 if(index>=playlist.length) index=0;
 player.loadVideoById(playlist[index]);
}

function prev(){
 index--;
 if(index<0) index=playlist.length-1;
 player.loadVideoById(playlist[index]);
}

</script>

</body>
</html>
