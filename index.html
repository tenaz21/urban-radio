<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
:root{
  --bg1:#0b0b0b;
  --bg2:#1a0000;
  --accent:#00ff88;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:#fff;
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  padding:10px;
}
.logo img{
  width:90%;
  max-width:420px;
  border-radius:12px;
  box-shadow:0 0 20px red;
}

/* BUSCADOR */
.search{
  width:85%;
  margin:auto;
  padding:12px;
  border-radius:25px;
  border:none;
  display:block;
}

/* BOTONES */
.topbar{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}
.topbar button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#fff;
  color:#000;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:140px;
}

.radio{
  background:#111;
  border-radius:15px;
  padding:12px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
  position:relative;
}
.radio:hover{transform:scale(1.05);}

.radio img{
  width:100%;
  height:90px;
  border-radius:10px;
}

.fav{
  position:absolute;
  top:6px;
  right:8px;
  font-size:18px;
}

/* PLAYER PRO */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,.95);
  backdrop-filter:blur(10px);
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.player img{
  width:50px;
  border-radius:10px;
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  background:var(--accent);
  border:none;
  border-radius:50%;
  padding:10px;
  font-size:16px;
}

.vol{width:80px}

/* EQUALIZER */
.eq{
  display:flex;
  gap:3px;
}
.bar{
  width:3px;
  height:10px;
  background:lime;
  animation:move 1s infinite;
}
@keyframes move{
  0%,100%{height:5px}
  50%{height:15px}
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<input class="search" id="search" placeholder="Buscar radio...">

<div class="topbar">
  <button onclick="mostrarTodo()">Radios</button>
  <button onclick="mostrarFav()">❤️ Favoritos</button>
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" src="https://via.placeholder.com/50">
  
  <div>
    <div id="titulo">Nada sonando</div>
    <div class="eq">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="play()">▶</button>
    <button class="btn" onclick="pause()">⏸</button>
  </div>

  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01" value="1">

  <audio id="audio"></audio>
</div>

<script>

/* 🔥 RADIOS ESTABLES */
let radios=[
{nombre:"Hip Hop Radio", url:"https://stream.0nlineradio.com/hip-hop"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits", url:"https://stream.zeno.fm/0r0xa792kwzuv"},
{nombre:"LoFi Chill", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},
{nombre:"Top 40 Mix", url:"https://stream.0nlineradio.com/top40"}
];

let favoritos=JSON.parse(localStorage.getItem("fav"))||[];
let listaActual=[...radios];

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");
const titulo=document.getElementById("titulo");
const cover=document.getElementById("cover");

/* LOGO GENERADOR */
function logo(n){
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=ff0000&color=fff`;
}

/* RENDER */
function render(lista){
  grid.innerHTML="";
  lista.forEach(r=>{
    const fav=favoritos.includes(r.nombre);

    const div=document.createElement("div");
    div.className="radio";
    div.innerHTML=`
      <span class="fav">${fav?"❤️":"🤍"}</span>
      <img src="${logo(r.nombre)}">
      <p>${r.nombre}</p>
    `;

    div.onclick=()=>{
      audio.src=r.url;
      audio.play();
      titulo.textContent=r.nombre;
      cover.src=logo(r.nombre);
    };

    div.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      if(fav){
        favoritos=favoritos.filter(f=>f!==r.nombre);
      }else{
        favoritos.push(r.nombre);
      }
      localStorage.setItem("fav",JSON.stringify(favoritos));
      render(listaActual);
    };

    grid.appendChild(div);
  });
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(listaActual.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* VISTAS */
function mostrarTodo(){
  listaActual=[...radios];
  render(listaActual);
}
function mostrarFav(){
  listaActual=radios.filter(r=>favoritos.includes(r.nombre));
  render(listaActual);
}

/* PLAYER */
function play(){audio.play();}
function pause(){audio.pause();}
vol.oninput=()=>audio.volume=vol.value;

/* ERROR HANDLER */
audio.onerror=()=>{
  alert("⚠️ Esta radio no funciona");
};

/* INIT */
render(radios);

</script>

</body>
</html>
