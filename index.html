<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0b0b;
  color:white;
}

/* LOGO */
.logo{
  text-align:center;
  padding:10px;
}
.logo img{
  width:90%;
  max-width:400px;
}

/* BUSCADOR */
.search{
  width:85%;
  margin:auto;
  padding:12px;
  border-radius:20px;
  border:none;
  display:block;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}
.cat{
  padding:8px 15px;
  background:#222;
  border-radius:20px;
  cursor:pointer;
}
.cat.active{
  background:#00ff88;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:140px;
}

.radio{
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.radio:hover{transform:scale(1.05);}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-around;
}

.btn{
  background:#00ff88;
  border:none;
  border-radius:50%;
  padding:12px;
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<input class="search" id="search" placeholder="Buscar...">

<!-- CATEGORIAS -->
<div class="categorias">
  <div class="cat active" onclick="filtrar('all')">Todo</div>
  <div class="cat" onclick="filtrar('urban')">Urban</div>
  <div class="cat" onclick="filtrar('dance')">Electrónica</div>
  <div class="cat" onclick="filtrar('romantic')">Romántica</div>
  <div class="cat" onclick="filtrar('chill')">Chill</div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <button class="btn" onclick="audio.play()">▶</button>
  <button class="btn" onclick="audio.pause()">⏸</button>
  <input type="range" id="vol" min="0" max="1" step="0.01">
</div>

<audio id="audio"></audio>

<script>

let radios=[

/* URBAN */
{nombre:"Hip Hop Radio", tipo:"urban", url:"https://stream.0nlineradio.com/hip-hop"},
{nombre:"181.FM The Beat", tipo:"urban", url:"https://listen.181fm.com/181-beat_128k.mp3"},

/* ELECTRONICA */
{nombre:"Dance Wave", tipo:"dance", url:"https://dancewave.online/dance.mp3"},
{nombre:"House Radio", tipo:"dance", url:"https://stream.0nlineradio.com/house"},

/* ROMANTICA */
{nombre:"Romantic Hits", tipo:"romantic", url:"https://stream.zeno.fm/0r0xa792kwzuv"},
{nombre:"Love Songs", tipo:"romantic", url:"https://stream.zeno.fm/9s7z1k5f8wzuv"},

/* CHILL */
{nombre:"LoFi Chill", tipo:"chill", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},
{nombre:"Soft Rock", tipo:"chill", url:"https://stream.0nlineradio.com/soft-rock"},

/* MIX */
{nombre:"Radio Internacional", tipo:"all", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Top 40 Mix", tipo:"all", url:"https://stream.0nlineradio.com/top40"}

];

let listaActual=[...radios];

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");

/* RENDER */
function render(lista){
  grid.innerHTML="";
  lista.forEach(r=>{
    const div=document.createElement("div");
    div.className="radio";
    div.innerHTML=`<p>${r.nombre}</p>`;
    div.onclick=()=>{
      audio.src=r.url;
      audio.play();
    };
    grid.appendChild(div);
  });
}

/* FILTRO */
function filtrar(tipo){
  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
  event.target.classList.add("active");

  if(tipo==="all") listaActual=radios;
  else listaActual=radios.filter(r=>r.tipo===tipo);

  render(listaActual);
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(listaActual.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* VOLUMEN */
vol.oninput=()=>audio.volume=vol.value;

/* INIT */
render(radios);

</script>

</body>
</html>
