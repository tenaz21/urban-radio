<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Radio PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #121212, #000);
  color: white;
}

header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  color: #1db954;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #181818;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  background: #1db954;
}

.card img {
  width: 100px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  text-align: center;
}

button {
  background: #1db954;
  border: none;
  padding: 15px;
  border-radius: 50%;
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<header>🎧 Urban Radio PRO</header>

<div class="grid">

<div class="card" onclick="playRadio('los40')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Los_40_logo.svg">
<p>LOS40</p>
</div>

<div class="card" onclick="playRadio('kiss')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Kiss_FM_Logo.svg">
<p>KISS FM</p>
</div>

<div class="card" onclick="playRadio('nrj')">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/NRJ_logo.svg">
<p>NRJ</p>
</div>

<div class="card" onclick="playRadio('dance')">
<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<p>Dance Wave</p>
</div>

<div class="card" onclick="playRadio('romantic')">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
<p>Romantic Hits</p>
</div>

<div class="card" onclick="playRadio('international')">
<img src="https://cdn-icons-png.flaticon.com/512/484/484167.png">
<p>Radio Internacional</p>
</div>

</div>

<div class="player">
<div id="now">Selecciona una radio</div>
<br>
<button onclick="toggle()">⏯</button>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");

const radios = {
  los40: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
  kiss: "https://kissfm.kissfmradio.cires21.com/kissfm.mp3",
  nrj: "https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3",
  dance: "https://stream.rcast.net/220602",
  romantic: "https://streaming.radionomy.com/RomanticHits",
  international: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"
};

function playRadio(name){
  audio.src = radios[name];
  audio.play();
  document.getElementById("now").innerText = "Reproduciendo: " + name.toUpperCase();
}

function toggle(){
  if(audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
