<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Radio PRO</title>

<!-- FUENTE PRO -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #121212, #000);
  font-family: 'Orbitron', sans-serif;
  color: white;
}

/* HEADER PRO */
header {
  text-align: center;
  font-size: 26px;
  margin: 15px;
  color: #1db954;
  text-shadow: 0 0 10px #1db954;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px;
}

/* CARDS PRO */
.card {
  background: linear-gradient(145deg, #1a1a1a, #111);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #1db954;
}

/* PLAYER PRO */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(15px);
  padding: 15px;
  text-align: center;
  border-top: 1px solid #222;
}

#now {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 10px;
}

/* BOTÓN PRO */
button {
  background: radial-gradient(circle, #1db954, #0a7d34);
  border: none;
  padding: 18px;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  box-shadow: 0 0 15px #1db954;
}

/* ANIMACIÓN */
@keyframes pulse {
  0% { box-shadow: 0 0 10px #1db954; }
  50% { box-shadow: 0 0 25px #1db954; }
  100% { box-shadow: 0 0 10px #1db954; }
}

button {
  animation: pulse 2s infinite;
}
</style>
</head>

<body>

<header>🔥 URBAN RADIO PRO</header>

<div class="grid">

<div class="card" onclick="playRadio('los40')">LOS40</div>
<div class="card" onclick="playRadio('kiss')">KISS FM</div>
<div class="card" onclick="playRadio('nrj')">NRJ</div>
<div class="card" onclick="playRadio('dance')">DANCE</div>
<div class="card" onclick="playRadio('romantic')">ROMANTIC</div>
<div class="card" onclick="playRadio('international')">GLOBAL</div>

</div>

<div class="player">
<div id="now">Selecciona una radio</div>
<button onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");

const radios = {
  los40: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
  kiss: "https://kissfm.kissfmradio.cires21.com/kissfm.mp3",
  nrj: "https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3",
  dance: "https://stream.rcast.net/220602",
  romantic: "https://streaming.radionomy.com/RomanticHits",
  international: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"
};

function playRadio(name){
  audio.src = radios[name];
  audio.play();
  document.getElementById("now").innerText = "🔊 " + name.toUpperCase();
}

function toggle(){
  if(audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
