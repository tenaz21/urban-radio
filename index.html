<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #1db954;
}

.search {
    margin: 10px;
    padding: 10px;
    width: 90%;
    border-radius: 20px;
    border: none;
    background: #1a1a1a;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: #1a1a1a;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    background: #1db954;
}

.card img {
    width: 80px;
    border-radius: 10px;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 10px;
    border-top: 1px solid #333;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 5px;
}

button {
    background: #1db954;
    border: none;
    padding: 10px;
    border-radius: 50%;
    color: white;
    font-size: 18px;
}
</style>
</head>

<body>

<header>🔥 Urban Radio PRO</header>

<input class="search" placeholder="Buscar radios...">

<div class="grid">

<div class="card" onclick="playRadio('los40')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Los_40_logo.svg">
<p>LOS40</p>
</div>

<div class="card" onclick="playRadio('urban')">
<img src="https://i.imgur.com/8Km9tLL.png">
<p>Urban Radio</p>
</div>

<div class="card" onclick="playRadio('dance')">
<img src="https://i.imgur.com/TKXb7YB.png">
<p>Dance Wave</p>
</div>

<div class="card" onclick="playRadio('romantic')">
<img src="https://i.imgur.com/4Z7b6FQ.png">
<p>Romantic Hits</p>
</div>

<div class="card" onclick="playRadio('international')">
<img src="https://i.imgur.com/YW6Xb3Q.png">
<p>Radio Internacional</p>
</div>

</div>

<div class="player">
<div id="now">Selecciona una radio</div>

<div class="controls">
<button onclick="toggle()">⏯</button>
</div>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");

const radios = {
    los40: "/los40",
    urban: "/urban",
    dance: "/dance",
    romantic: "/romantic",
    international: "/international"
};

function playRadio(name) {
    audio.src = radios[name];
    audio.play();
    document.getElementById("now").innerText = "Reproduciendo: " + name;
}

function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
}

// AUTO SWITCH si falla
audio.onerror = function() {
    console.log("error, cambiando...");
    playRadio("urban");
};
</script>

</body>
</html>
