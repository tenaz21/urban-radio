<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow GOD MODE</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  padding:15px;
}
.title{
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#1e293b;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:150px;
}

.card{
  background:#1e293b;
  border-radius:18px;
  padding:10px;
  position:relative;
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:12px;
}

.name{
  text-align:center;
  margin-top:5px;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:5px;
  right:8px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.cover{
  width:50px;
  border-radius:10px;
}

.meta{
  flex:1;
}

.song{
  font-size:12px;
  opacity:.7;
}

.btn{
  background:#22c55e;
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎧 Urban Flow GOD</div>
  <input id="search" class="search" placeholder="Buscar radio...">
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <img id="cover" class="cover" src="">
  <div class="meta">
    <div id="title">Nada sonando</div>
    <div id="song" class="song">---</div>
  </div>
  <button id="playBtn" class="btn">▶</button>
</div>

<audio id="audio"></audio>

<script>

/* 🎧 RADIOS CON LOGOS */
const radios = [
{
  nombre:"LOS40",
  logo:"https://upload.wikimedia.org/wikipedia/commons/7/7a/Los40_logo.png",
  urls:[
    "https://live.amperwave.net/direct/prisaradio-los40",
    "https://streaming.radio.co/s97782a8e/listen"
  ]
},
{
  nombre:"Urban Radio",
  logo:"https://cdn-icons-png.flaticon.com/512/727/727245.png",
  urls:["https://stream.0nlineradio.com/urban"]
},
{
  nombre:"Dance Wave",
  logo:"https://cdn-icons-png.flaticon.com/512/3659/3659899.png",
  urls:["https://dancewave.online/dance.mp3"]
},
{
  nombre:"Radio Internacional",
  logo:"https://cdn-icons-png.flaticon.com/512/727/727218.png",
  urls:["https://streams.ilovemusic.de/iloveradio1.mp3"]
},
{
  nombre:"Romantic Hits",
  logo:"https://cdn-icons-png.flaticon.com/512/833/833472.png",
  urls:["https://stream.zeno.fm/0r0xa792kwzuv"]
}
];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const song = document.getElementById("song");
const cover = document.getElementById("cover");

let currentRadio = null;
let currentIndex = 0;

/* ▶ PLAY */
function playRadio(r){
  currentRadio = r;
  currentIndex = 0;
  tryPlay();

  cover.src = r.logo;
}

/* 🔄 AUTOSWITCH */
function tryPlay(){
  if(currentIndex >= currentRadio.urls.length){
    title.textContent = "❌ No disponible";
    return;
  }

  const url = currentRadio.urls[currentIndex];

  audio.src = url;
  audio.load();

  audio.play().then(()=>{
    title.textContent = currentRadio.nombre;
    getMetadata();
  }).catch(()=>{
    next();
  });
}

function next(){
  currentIndex++;
  setTimeout(tryPlay,1000);
}

/* FALLAS */
audio.addEventListener("error", next);
audio.addEventListener("stalled", next);

/* 🎵 METADATA (SIMULADA) */
function getMetadata(){
  song.textContent = "🎵 En vivo...";
}

/* FAVORITOS */
function toggleFav(nombre){
  if(favoritos.includes(nombre)){
    favoritos = favoritos.filter(f=>f!==nombre);
  }else{
    favoritos.push(nombre);
  }
  localStorage.setItem("fav",JSON.stringify(favoritos));
  render(radios);
}

/* RENDER */
function render(list){
  grid.innerHTML="";
  list.forEach(r=>{
    const fav = favoritos.includes(r.nombre);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <span class="fav">${fav?"❤️":"🤍"}</span>
      <img src="${r.logo}">
      <div class="name">${r.nombre}</div>
    `;

    d.onclick=()=>playRadio(r);

    d.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      toggleFav(r.nombre);
    };

    grid.appendChild(d);
  });
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(radios.filter(r=>r.nombre.toLowerCase().includes(t)));
};

render(radios);

</script>

</body>
</html>
