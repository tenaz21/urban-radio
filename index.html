<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio PRO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(#121212, #000);
    color: white;
}

header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #1db954;
}

.search {
    margin: 10px;
    padding: 12px;
    width: 90%;
    border-radius: 30px;
    border: none;
    background: #1e1e1e;
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 10px;
}

.card {
    background: #181818;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    background: #1db954;
}

.card img {
    width: 90px;
    border-radius: 12px;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #121212;
    padding: 10px;
    border-top: 1px solid #333;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    background: #1db954;
    border: none;
    padding: 12px;
    border-radius: 50%;
    color: white;
    font-size: 18px;
}

#now {
    text-align: center;
    margin-bottom: 5px;
    font-size: 14px;
    color: #ccc;
}
</style>
</head>

<body>

<header>🎧 Urban Radio PRO</header>

<input class="search" placeholder="Buscar radios...">

<div class="grid">

<div class="card" onclick="playRadio('los40')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Los_40_logo.svg">
<p>LOS40</p>
</div>

<div class="card" onclick="playRadio('kiss')">
<img src="https://i.imgur.com/VZ6F6Qx.png">
<p>KISS FM</p>
</div>

<div class="card" onclick="playRadio('nrj')">
<img src="https://i.imgur.com/6XbZQ6F.png">
<p>NRJ</p>
</div>

<div class="card" onclick="playRadio('dance')">
<img src="https://i.imgur.com/TKXb7YB.png">
<p>Dance Wave</p>
</div>

<div class="card" onclick="playRadio('romantic')">
<img src="https://i.imgur.com/4Z7b6FQ.png">
<p>Romantic Hits</p>
</div>

<div class="card" onclick="playRadio('international')">
<img src="https://i.imgur.com/YW6Xb3Q.png">
<p>Radio Internacional</p>
</div>

</div>

<div class="player">
<div id="now">Selecciona una radio</div>

<div class="controls">
<button onclick="toggle()">⏯</button>
</div>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");

const radios = {
    los40: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
    kiss: "https://kissfm.kissfmradio.cires21.com/kissfm.mp3",
    nrj: "https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3",
    dance: "https://stream.rcast.net/220602",
    romantic: "https://streaming.radionomy.com/RomanticHits",
    international: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"
};

function playRadio(name) {
    audio.src = radios[name];
    audio.play();
    document.getElementById("now").innerText = "Reproduciendo: " + name.toUpperCase();
}

function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
}

// AUTO SWITCH PRO
audio.onerror = function() {
    document.getElementById("now").innerText = "⚠️ Cambiando radio automáticamente...";
    audio.src = radios["nrj"];
    audio.play();
};
</script>

</body>
</html>
