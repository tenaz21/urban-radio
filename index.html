<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio Perú</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* LOGO */
.logo{
  text-align:center;
  padding:20px;
  font-size:30px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#ffd000,#00ff66,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SEARCH */
.search{
  width:90%;
  margin:auto;
  display:block;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#181818;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
  padding-bottom:120px;
}

/* CARD */
.card{
  background:#181818;
  padding:15px;
  border-radius:15px;
  text-align:center;
  position:relative;
}

.card:hover{
  background:#ff0055;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:5px;
  right:10px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.cover{
  width:50px;
  border-radius:10px;
}

.info{
  flex:1;
}

button{
  background:#00ff66;
  border:none;
  padding:10px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="logo">🎧 URBAN RADIO PERÚ 🇵🇪</div>

<input class="search" id="search" placeholder="Buscar radio...">

<!-- RADIOS -->
<div class="logo" style="font-size:20px;">📻 RADIOS</div>
<div class="grid" id="grid"></div>

<!-- CANCIONES -->
<div class="logo" style="font-size:20px;">🎵 CANCIONES</div>
<div class="grid" id="songs"></div>

<!-- PLAYER -->
<div class="player">
<img id="cover" class="cover" src="https://via.placeholder.com/50">
<div class="info">
<div id="title">Nada sonando</div>
</div>
<button id="playBtn">▶</button>
<audio id="audio"></audio>
</div>

<script>

/* RADIOS ESTABLES */
const radios=[
{name:"LOS40",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3"},
{name:"RPP",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC"},
{name:"Exitosa",url:"https://cu.onliv3.com/live/exitosa.mp3"},
{name:"Oxígeno",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/OXIGENO.mp3"},
{name:"Planeta",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/PLANETA.mp3"},
{name:"BBC",url:"https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"},
{name:"NRJ",url:"https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3"},
{name:"KISS FM",url:"https://kissfm.kissfmradio.cires21.com/kissfm.mp3"}
];

/* CANCIONES */
const canciones=[
{name:"Hip Hop Beat",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{name:"Chill Vibes",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
{name:"Rap Instrumental",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
{name:"LoFi Relax",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
{name:"Beat Flow",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"},
{name:"Urban Mood",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"},
{name:"Street Beat",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3"},
{name:"Chill Night",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"},
{name:"Deep Flow",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3"},
{name:"Trap Beat",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"}
];

let favoritos=JSON.parse(localStorage.getItem("fav"))||[];

const grid=document.getElementById("grid");
const songs=document.getElementById("songs");
const audio=document.getElementById("audio");
const title=document.getElementById("title");
const cover=document.getElementById("cover");
const playBtn=document.getElementById("playBtn");

/* LOGO */
function logo(n){
 return "https://ui-avatars.com/api/?name="+encodeURIComponent(n)+"&background=ff0000&color=fff";
}

/* PLAY */
function playItem(item){
 audio.src=item.url;
 audio.play();
 title.textContent=item.name;
 cover.src=logo(item.name);
}

/* RADIOS */
function renderRadios(){
 grid.innerHTML="";
 radios.forEach(r=>{
  const fav=favoritos.includes(r.name);

  const d=document.createElement("div");
  d.className="card";

  d.innerHTML=`
   <span class="fav">${fav?"❤️":"🤍"}</span>
   <p>${r.name}</p>
  `;

  d.onclick=()=>playItem(r);

  d.querySelector(".fav").onclick=(e)=>{
    e.stopPropagation();
    if(fav){
      favoritos=favoritos.filter(f=>f!==r.name);
    }else{
      favoritos.push(r.name);
    }
    localStorage.setItem("fav",JSON.stringify(favoritos));
    renderRadios();
  };

  grid.appendChild(d);
 });
}

/* CANCIONES */
function renderSongs(){
 songs.innerHTML="";
 canciones.forEach(c=>{
  const d=document.createElement("div");
  d.className="card";

  d.innerHTML=`<p>${c.name}</p>`;

  d.onclick=()=>playItem(c);

  songs.appendChild(d);
 });
}

/* BUSCADOR */
search.oninput=e=>{
 const t=e.target.value.toLowerCase();
 renderRadios(radios.filter(r=>r.name.toLowerCase().includes(t)));
};

/* PLAY BTN */
playBtn.onclick=()=>{
 audio.paused?audio.play():audio.pause();
};

audio.onplay=()=>playBtn.textContent="⏸";
audio.onpause=()=>playBtn.textContent="▶";

/* INIT */
renderRadios();
renderSongs();

/* PWA */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
