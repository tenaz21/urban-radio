<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow Player</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
}
.header img{
  width:90%;
  max-width:300px;
}

/* BOTONES */
.top{
  display:flex;
  justify-content:center;
  gap:10px;
}
.top button{
  padding:10px;
  border:none;
  border-radius:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
  padding-bottom:160px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}

.btn{
  background:#1db954;
  border:none;
  border-radius:50%;
  padding:15px;
}

/* PROGRESS */
.progress{
  width:100%;
}

/* VOL */
.vol{
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<div class="top">
  <button onclick="modo='radio';render(radios)">Radios</button>
  <button onclick="modo='musica';render(miMusica)">Mi Música</button>
</div>

<input type="file" id="fileInput" accept="audio/*">

<div class="grid" id="grid"></div>

<div class="player">
  <h3 id="titulo">Nada sonando</h3>

  <input type="range" id="progress" class="progress">

  <div class="controls">
    <button class="btn" onclick="prev()">⏮</button>
    <button class="btn" onclick="play()">▶</button>
    <button class="btn" onclick="pause()">⏸</button>
    <button class="btn" onclick="next()">⏭</button>
  </div>

  <input type="range" id="vol" class="vol" min="0" max="1" step="0.01">
</div>

<audio id="audio"></audio>

<script>

/* RADIOS */
let radios=[
{nombre:"Hip Hop Radio", url:"https://stream.0nlineradio.com/hip-hop"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"}
];

/* TU MUSICA */
let miMusica=[];

let listaActual=[];
let index=0;
let modo="radio";

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");
const titulo=document.getElementById("titulo");

/* RENDER */
function render(lista){
  listaActual=lista;
  grid.innerHTML="";
  lista.forEach((r,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<p>${r.nombre}</p>`;
    div.onclick=()=>{
      index=i;
      playIndex();
    };
    grid.appendChild(div);
  });
}

/* PLAY */
function playIndex(){
  const item=listaActual[index];
  audio.src=item.url;
  audio.play();
  titulo.textContent=item.nombre;
}

/* CONTROLES */
function play(){audio.play();}
function pause(){audio.pause();}
function next(){
  index=(index+1)%listaActual.length;
  playIndex();
}
function prev(){
  index=(index-1+listaActual.length)%listaActual.length;
  playIndex();
}

/* PROGRESO */
audio.ontimeupdate=()=>{
  progress.value=audio.currentTime;
  progress.max=audio.duration||0;
};

/* VOLUMEN */
vol.oninput=()=>audio.volume=vol.value;

/* SUBIR MUSICA */
fileInput.onchange=(e)=>{
  const file=e.target.files[0];
  if(file){
    const url=URL.createObjectURL(file);
    miMusica.push({nombre:file.name,url:url});
    if(modo==="musica") render(miMusica);
  }
};

/* AUTO NEXT */
audio.onended=next;

/* INIT */
render(radios);

</script>

</body>
</html>
