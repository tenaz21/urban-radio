<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(180deg,#000,#1a0000);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
}
.header img{
  width:90%;
  max-width:350px;
}

/* SEARCH */
.search{
  width:85%;
  margin:auto;
  padding:12px;
  border-radius:25px;
  border:none;
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
  padding-bottom:160px;
}

/* CARD PRO */
.card{
  background:linear-gradient(145deg,#111,#1a1a1a);
  border-radius:20px;
  padding:15px;
  text-align:center;
  position:relative;
  box-shadow:0 0 15px rgba(0,255,150,0.1);
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,255,150,0.4);
}

/* PLAY BUTTON */
.play{
  position:absolute;
  bottom:10px;
  right:10px;
  background:#1db954;
  border-radius:50%;
  padding:10px;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:8px;
  right:10px;
  font-size:18px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  padding:10px;
}

.player h3{
  margin:5px 0;
}

/* CONTROLES */
.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}

.btn{
  background:#1db954;
  border:none;
  border-radius:50%;
  padding:14px;
  font-size:16px;
}

/* PROGRESS */
.progress{
  width:100%;
}

/* EQ */
.eq{
  display:flex;
  gap:3px;
}
.bar{
  width:3px;
  height:10px;
  background:#1db954;
  animation:move 1s infinite;
}
@keyframes move{
  0%,100%{height:5px}
  50%{height:15px}
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<input class="search" id="search" placeholder="Buscar...">

<div class="grid" id="grid"></div>

<div class="player">
  <h3 id="titulo">Nada sonando</h3>

  <div class="eq">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <input type="range" id="progress" class="progress">

  <div class="controls">
    <button class="btn" onclick="audio.play()">▶</button>
    <button class="btn" onclick="audio.pause()">⏸</button>
  </div>

  <input type="range" id="vol" min="0" max="1" step="0.01">
</div>

<audio id="audio"></audio>

<script>

let radios=[
{nombre:"Hip Hop Radio", url:"https://stream.0nlineradio.com/hip-hop"},
{nombre:"Dance Wave", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"LoFi Chill", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},
{nombre:"Top 40 Mix", url:"https://stream.0nlineradio.com/top40"}
];

let favoritos=JSON.parse(localStorage.getItem("fav"))||[];

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");
const titulo=document.getElementById("titulo");

/* RENDER */
function render(lista){
  grid.innerHTML="";
  lista.forEach(r=>{
    const fav=favoritos.includes(r.nombre);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="fav">${fav?"❤️":"🤍"}</span>
      <p>${r.nombre}</p>
      <div class="play">▶</div>
    `;

    div.onclick=()=>{
      audio.src=r.url;
      audio.play();
      titulo.textContent=r.nombre;
    };

    div.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      if(fav){
        favoritos=favoritos.filter(f=>f!==r.nombre);
      }else{
        favoritos.push(r.nombre);
      }
      localStorage.setItem("fav",JSON.stringify(favoritos));
      render(radios);
    };

    grid.appendChild(div);
  });
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(radios.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* PROGRESO */
audio.ontimeupdate=()=>{
  progress.value=audio.currentTime;
  progress.max=audio.duration||0;
};

/* VOLUMEN */
vol.oninput=()=>audio.volume=vol.value;

/* INIT */
render(radios);

</script>

</body>
</html>
