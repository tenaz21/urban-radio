<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN FLOW RADIO</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
}
.header img{
  width:90%;
  max-width:350px;
}

/* SEARCH */
.search{
  width:85%;
  margin:auto;
  padding:12px;
  border-radius:20px;
  border:none;
  display:block;
}

/* CATEGORIAS */
.categorias{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}
.cat{
  padding:8px 15px;
  background:#222;
  border-radius:20px;
}
.active{
  background:#1db954;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:160px;
}

.card{
  background:#121212;
  border-radius:15px;
  padding:15px;
  text-align:center;
  position:relative;
  cursor:pointer;
}
.card:hover{transform:scale(1.05);}

/* FAVORITO */
.fav{
  position:absolute;
  top:8px;
  right:10px;
  font-size:18px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#181818;
  padding:10px;
}

.info{
  display:flex;
  align-items:center;
  gap:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:5px;
}

.btn{
  background:#1db954;
  border:none;
  border-radius:50%;
  padding:12px;
}

.progress{
  width:100%;
}

/* EQ */
.eq{
  display:flex;
  gap:3px;
}
.bar{
  width:3px;
  height:10px;
  background:#1db954;
  animation:move 1s infinite;
}
@keyframes move{
  0%,100%{height:5px}
  50%{height:15px}
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<input class="search" id="search" placeholder="Buscar...">

<div class="categorias">
  <div class="cat active" onclick="filtrar('all')">Todo</div>
  <div class="cat" onclick="filtrar('urban')">Urban</div>
  <div class="cat" onclick="filtrar('dance')">Electrónica</div>
  <div class="cat" onclick="filtrar('chill')">Chill</div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
  <div class="info">
    <div id="titulo">Nada sonando</div>
    <div class="eq">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <input type="range" id="progress" class="progress">

  <div class="controls">
    <button class="btn" onclick="audio.play()">▶</button>
    <button class="btn" onclick="audio.pause()">⏸</button>
  </div>

  <input type="range" id="vol" min="0" max="1" step="0.01">
</div>

<audio id="audio"></audio>

<script>

let radios=[
{nombre:"Hip Hop Radio", tipo:"urban", url:"https://stream.0nlineradio.com/hip-hop"},
{nombre:"Dance Wave", tipo:"dance", url:"https://dancewave.online/dance.mp3"},
{nombre:"Radio Internacional", tipo:"all", url:"https://streams.ilovemusic.de/iloveradio1.mp3"},
{nombre:"Romantic Hits", tipo:"chill", url:"https://stream.zeno.fm/0r0xa792kwzuv"},
{nombre:"LoFi Chill", tipo:"chill", url:"https://stream.zeno.fm/f3y6q8zq5wzuv"},
{nombre:"Top 40 Mix", tipo:"all", url:"https://stream.0nlineradio.com/top40"}
];

let favoritos=JSON.parse(localStorage.getItem("fav"))||[];
let listaActual=[...radios];

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");
const titulo=document.getElementById("titulo");

/* RENDER */
function render(lista){
  grid.innerHTML="";
  lista.forEach(r=>{
    const fav=favoritos.includes(r.nombre);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="fav">${fav?"❤️":"🤍"}</span>
      <p>${r.nombre}</p>
    `;

    div.onclick=()=>{
      audio.src=r.url;
      audio.play();
      titulo.textContent=r.nombre;
    };

    div.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      if(fav){
        favoritos=favoritos.filter(f=>f!==r.nombre);
      }else{
        favoritos.push(r.nombre);
      }
      localStorage.setItem("fav",JSON.stringify(favoritos));
      render(listaActual);
    };

    grid.appendChild(div);
  });
}

/* FILTRO */
function filtrar(tipo){
  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
  event.target.classList.add("active");

  if(tipo==="all") listaActual=radios;
  else listaActual=radios.filter(r=>r.tipo===tipo);

  render(listaActual);
}

/* BUSCAR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(listaActual.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* PROGRESO */
audio.ontimeupdate=()=>{
  progress.value=audio.currentTime;
  progress.max=audio.duration||0;
};

/* VOLUMEN */
vol.oninput=()=>audio.volume=vol.value;

/* INIT */
render(radios);

</script>

</body>
</html>
