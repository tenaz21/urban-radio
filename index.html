<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card:hover{
  background:#334155;
}

img{
  width:100%;
  border-radius:10px;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<header>🎧 Urban Radio PRO</header>

<div class="grid">

<div class="card" onclick="play('https://stream-ssl.radioacktiva.com/stream')">
<img src="https://i.imgur.com/8Km9tLL.png">
<p>Rock</p>
</div>

<div class="card" onclick="play('https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one')">
<img src="https://i.imgur.com/5b6p8zC.png">
<p>BBC One</p>
</div>

<div class="card" onclick="play('https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3')">
<img src="https://i.imgur.com/zYIlgBl.png">
<p>LOS40</p>
</div>

<div class="card" onclick="play('https://stream.zeno.fm/f3h3k1q0x1zuv')">
<img src="https://i.imgur.com/Z6XK0nH.png">
<p>Urbana</p>
</div>

</div>

<div class="player">
<span id="status">Selecciona radio</span>
<button onclick="toggle()">▶️</button>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let playing = false;

function play(url){
  audio.src = url;
  audio.play();
  document.getElementById("status").innerText = "Reproduciendo...";
  playing = true;
}

function toggle(){
  if(playing){
    audio.pause();
    playing = false;
  }else{
    audio.play();
    playing = true;
  }
}

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
