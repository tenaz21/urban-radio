<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Radio Perú</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* LOGO */
.logo{
  text-align:center;
  padding:20px;
  font-size:32px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#ffd000,#00ff66);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* CARDS */
.card{
  background:#181818;
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  background:#ff0055;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:15px;
  text-align:center;
}

button{
  background:#00ff66;
  border:none;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}
</style>
</head>

<body>

<div class="logo">
🎧 URBAN RADIO PERÚ 🇵🇪
</div>

<div class="grid">

<div class="card" onclick="play('los40')">LOS40</div>
<div class="card" onclick="play('rpp')">RPP</div>
<div class="card" onclick="play('exitosa')">Exitosa</div>
<div class="card" onclick="play('oxigeno')">Oxígeno</div>
<div class="card" onclick="play('felicidad')">La Inolvidable</div>
<div class="card" onclick="play('planet')">Radio Planeta</div>

<!-- INTERNACIONALES -->
<div class="card" onclick="play('bbc')">BBC</div>
<div class="card" onclick="play('kiss')">Kiss FM</div>
<div class="card" onclick="play('nrj')">NRJ</div>
<div class="card" onclick="play('dance')">Dance Wave</div>

</div>

<div class="player">
<div id="status">Nada reproduciendo</div>
<button onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>
let audio=document.getElementById("audio");

const radios={

los40:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",

rpp:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC",

exitosa:"https://cu.onliv3.com/live/exitosa.mp3",

oxigeno:"https://playerservices.streamtheworld.com/api/livestream-redirect/OXIGENO.mp3",

felicidad:"https://playerservices.streamtheworld.com/api/livestream-redirect/INOLVIDABLE.mp3",

planet:"https://playerservices.streamtheworld.com/api/livestream-redirect/PLANETA.mp3",

bbc:"https://stream.live.vc.bbcmedia.co.uk/bbc_world_service",

kiss:"https://kissfm.kissfmradio.cires21.com/kissfm.mp3",

nrj:"https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3",

dance:"https://stream.rcast.net/220602"

};

function play(r){
 audio.src=radios[r];
 audio.play();
 document.getElementById("status").innerText="▶ "+r;
}

function toggle(){
 audio.paused?audio.play():audio.pause();
}

/* SI FALLA */
audio.onerror=()=>{
 document.getElementById("status").innerText="❌ Radio no disponible";
}
</script>

</body>
</html>
