<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
}

.title{
  font-size:24px;
  font-weight:bold;
  color:#00ff88;
}

/* SEARCH */
.search{
  width:100%;
  padding:12px;
  border-radius:15px;
  border:none;
  background:#181818;
  color:white;
  margin-top:10px;
}

/* SECTION */
.section{
  padding:10px;
}

.section h2{
  margin:10px 0;
}

/* CARDS */
.cards{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.card{
  min-width:140px;
  background:#181818;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* LIST */
.list{
  padding:10px;
}

.item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:10px;
}

.item img{
  width:50px;
  border-radius:10px;
}

/* GENRES */
.genres{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.genre{
  padding:20px;
  border-radius:15px;
  font-weight:bold;
}

.pop{background:#ff0055;}
.urbano{background:#00ff88;}
.electro{background:#0099ff;}
.rock{background:#ff8800;}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:15px;
}

button{
  background:#00ff88;
  border:none;
  padding:12px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎧 URBAN FLOW</div>
  <input class="search" placeholder="Buscar radios...">
</div>

<!-- DESTACADAS -->
<div class="section">
<h2>Radios Destacadas</h2>

<div class="cards" id="destacadas"></div>
</div>

<!-- POPULARES -->
<div class="section">
<h2>Populares</h2>

<div class="list" id="lista"></div>
</div>

<!-- GENEROS -->
<div class="section">
<h2>Géneros</h2>

<div class="genres">
<div class="genre urbano">Urbano</div>
<div class="genre pop">Pop</div>
<div class="genre electro">Electrónica</div>
<div class="genre rock">Rock</div>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<div id="title">Nada sonando</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>

/* RADIOS PRO */
const radios=[
{
name:"LOS40",
url:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Los_40_Principales_logo.svg/512px-Los_40_Principales_logo.svg.png"
},
{
name:"Urban Radio",
url:"https://stream.zeno.fm/0r0xa792kwzuv",
img:"https://i.imgur.com/8Km9tLL.png"
},
{
name:"Dance Wave",
url:"https://stream.zeno.fm/f3w2z7r7u8quv",
img:"https://i.imgur.com/Qz1Z4.jpg"
},
{
name:"Radio Internacional",
url:"https://stream.zeno.fm/8m5r5w8rquzuv",
img:"https://i.imgur.com/4Qy6.jpg"
},
{
name:"Romantic Hits",
url:"https://stream.zeno.fm/2y5p8n5qzquv",
img:"https://i.imgur.com/jv7Y.jpg"
}
];

let index=0;

const audio=document.getElementById("audio");
const title=document.getElementById("title");

/* DESTACADAS */
const destacadas=document.getElementById("destacadas");

radios.forEach((r,i)=>{
 let d=document.createElement("div");
 d.className="card";
 d.innerHTML=`<img src="${r.img}"><p>${r.name}</p>`;
 d.onclick=()=>play(i);
 destacadas.appendChild(d);
});

/* LISTA */
const lista=document.getElementById("lista");

radios.forEach((r,i)=>{
 let d=document.createElement("div");
 d.className="item";
 d.innerHTML=`<img src="${r.img}"><div>${r.name}</div>`;
 d.onclick=()=>play(i);
 lista.appendChild(d);
});

/* PLAYER */
function play(i){
 index=i;
 audio.src=radios[i].url;
 audio.play();
 title.innerText="▶ "+radios[i].name;
}

function toggle(){
 audio.paused?audio.play():audio.pause();
}

function next(){
 index++;
 if(index>=radios.length) index=0;
 play(index);
}

function prev(){
 index--;
 if(index<0) index=radios.length-1;
 play(index);
}

</script>

</body>
</html>
