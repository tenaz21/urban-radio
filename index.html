<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Radio PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
}

.title {
  font-size: 30px;
  font-weight: bold;
  color: #1db954;
}

.section {
  padding: 10px 20px;
  font-weight: bold;
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

/* CARDS */
.card {
  background: #181818;
  border-radius: 20px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #1db954;
}

.card img {
  width: 80px;
  margin-bottom: 10px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 15px;
  border-top: 1px solid #333;
}

.station {
  text-align: center;
  font-size: 16px;
}

.controls {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.play {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #1db954;
  color: white;
  font-size: 22px;
}

/* BARRAS */
.eq {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 5px;
}

.bar {
  width: 4px;
  height: 10px;
  background: #1db954;
  animation: b 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}

@keyframes b {
  0%,100%{height:5px}
  50%{height:15px}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎧 Urban Radio PRO</div>
</div>

<div class="section">🌎 Radios en Vivo</div>

<div class="grid">

<div class="card" onclick="play('LOS40')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Los_40_logo.svg">
<p>LOS40</p>
</div>

<div class="card" onclick="play('NRJ')">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/NRJ_logo.svg">
<p>NRJ</p>
</div>

<div class="card" onclick="play('KISS')">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Kiss_FM_Logo.svg">
<p>KISS FM</p>
</div>

<div class="card" onclick="play('DANCE')">
<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
<p>Dance Wave</p>
</div>

<div class="card" onclick="play('BBC')">
<img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
<p>BBC World</p>
</div>

<div class="card" onclick="play('JAZZ')">
<img src="https://cdn-icons-png.flaticon.com/512/727/727218.png">
<p>Jazz Radio</p>
</div>

</div>

<div class="section">🎵 Playlists (Sin Copyright)</div>

<div class="grid">

<div class="card" onclick="play('HIPHOP')">
<p>🔥 Hip Hop</p>
</div>

<div class="card" onclick="play('LOFI')">
<p>🌙 LoFi Chill</p>
</div>

<div class="card" onclick="play('BALADAS')">
<p>❤️ Baladas</p>
</div>

<div class="card" onclick="play('LATINO')">
<p>🌎 Rap Latino</p>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<div class="station" id="name">Nada reproduciendo</div>

<div class="eq">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="controls">
<button class="play" onclick="toggle()">▶</button>
</div>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let current = "";

/* RADIOS + PLAYLIST */
const streams = {

LOS40: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3",
NRJ: "https://scdn.nrjaudio.fm/adwz1/fr/30001/mp3_128.mp3",
KISS: "https://kissfm.kissfmradio.cires21.com/kissfm.mp3",
DANCE: "https://stream.rcast.net/220602",
BBC: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service",
JAZZ: "https://jazz-wr01.ice.infomaniak.ch/jazz-wr01-128.mp3",

/* PLAYLISTS */
HIPHOP: "https://stream.zeno.fm/f3h1r7m9fwzuv",
LOFI: "https://stream.zeno.fm/0r0xa792kwzuv",
BALADAS: "https://stream.zeno.fm/8z8v3p9wzqzuv",
LATINO: "https://stream.zeno.fm/4wq9x9rwq7zuv"

};

function play(name){
  current = name;
  audio.src = streams[name];
  audio.play();
  document.getElementById("name").innerText = "▶ " + name;
}

function toggle(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* AUTO FIX STREAM */
audio.onerror = function(){
  document.getElementById("name").innerText = "Reconectando...";
  audio.load();
  audio.play();
};
</script>

</body>
</html>
