<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<style>
:root{
  --bg:#020617;
  --card:#1e293b;
  --accent:#22c55e;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  padding:15px;
}
.title{
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  background:var(--card);
  color:white;
  margin-top:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
  padding-bottom:150px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px var(--accent);
}

.name{
  text-align:center;
  margin-top:6px;
}

.fav{
  position:absolute;
  top:5px;
  right:8px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  border-top:1px solid #1e293b;
}

.meta{
  flex:1;
}

.btn{
  background:var(--accent);
  border:none;
  border-radius:50%;
  width:45px;
  height:45px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🎧 Urban Flow</div>
  <input id="search" class="search" placeholder="Buscar radio...">
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <div class="meta">
    <div id="title">Nada sonando</div>
  </div>
  <button id="playBtn" class="btn">▶</button>
</div>

<audio id="audio"></audio>

<script>
const radios = [
{
  nombre:"LOS40",
  urls:[
    "https://live.amperwave.net/direct/prisaradio-los40",
    "https://streaming.radio.co/s97782a8e/listen"
  ]
},
{
  nombre:"Urban Radio",
  urls:["https://stream.0nlineradio.com/urban"]
},
{
  nombre:"Dance Wave",
  urls:["https://dancewave.online/dance.mp3"]
},
{
  nombre:"Radio Internacional",
  urls:["https://streams.ilovemusic.de/iloveradio1.mp3"]
},
{
  nombre:"Romantic Hits",
  urls:["https://stream.zeno.fm/0r0xa792kwzuv"]
}
];

let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playBtn = document.getElementById("playBtn");

let currentRadio = null;
let currentIndex = 0;
let playing = false;

/* ▶ PLAY */
function playRadio(r){
  currentRadio = r;
  currentIndex = 0;
  tryPlay();
}

/* 🔄 AUTOSWITCH */
function tryPlay(){
  if(currentIndex >= currentRadio.urls.length){
    title.textContent = "❌ No disponible";
    return;
  }

  const url = currentRadio.urls[currentIndex];

  audio.src = url;
  audio.load();

  audio.play().then(()=>{
    title.textContent = "🎧 " + currentRadio.nombre;
    playing = true;
  }).catch(()=>{
    next();
  });
}

function next(){
  currentIndex++;
  setTimeout(tryPlay,1000);
}

/* FALLAS */
audio.addEventListener("error", next);
audio.addEventListener("stalled", next);

/* PLAY BTN */
playBtn.onclick=()=>{
  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="▶";
  }else{
    audio.play();
    playing=true;
    playBtn.textContent="⏸";
  }
};

/* FAVORITOS */
function toggleFav(nombre){
  if(favoritos.includes(nombre)){
    favoritos = favoritos.filter(f=>f!==nombre);
  }else{
    favoritos.push(nombre);
  }
  localStorage.setItem("fav",JSON.stringify(favoritos));
  render(radios);
}

/* RENDER */
function render(list){
  grid.innerHTML="";
  list.forEach(r=>{
    const fav = favoritos.includes(r.nombre);

    const d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <span class="fav">${fav?"❤️":"🤍"}</span>
      <div class="name">${r.nombre}</div>
    `;

    d.onclick=()=>playRadio(r);

    d.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      toggleFav(r.nombre);
    };

    grid.appendChild(d);
  });
}

/* BUSCADOR */
search.oninput=e=>{
  const t=e.target.value.toLowerCase();
  render(radios.filter(r=>r.nombre.toLowerCase().includes(t)));
};

/* INIT */
render(radios);

/* SERVICE WORKER */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
