<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card:hover{
  background:#334155;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<header>🎧 Urban Radio PRO</header>

<div class="grid">

<div class="card" onclick="play('https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3')">
<p>LOS40</p>
</div>

<div class="card" onclick="play('https://stream.0nlineradio.com/urban')">
<p>Urban Radio</p>
</div>

<div class="card" onclick="play('https://dancewave.online/dance.mp3')">
<p>Dance Wave</p>
</div>

<div class="card" onclick="play('https://streams.ilovemusic.de/iloveradio1.mp3')">
<p>Radio Internacional</p>
</div>

<div class="card" onclick="play('https://stream.zeno.fm/0r0xa792kwzuv')">
<p>Romantic Hits EU</p>
</div>

<div class="card" onclick="play('https://icecast.radiofrance.fr/fip-midfi.mp3')">
<p>FIP Radio</p>
</div>

</div>

<div class="player">
<span id="status">Selecciona radio</span>
<button onclick="toggle()">▶️</button>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let currentUrl = "";
let playing = false;

/* ▶ REPRODUCIR */
function play(url){
  currentUrl = url;

  audio.src = url;
  audio.load();

  audio.play().then(()=>{
    document.getElementById("status").innerText = "Reproduciendo...";
    playing = true;
  }).catch(()=>{
    alert("Toca nuevamente para iniciar la radio");
  });
}

/* ▶ / ⏸ */
function toggle(){
  if(playing){
    audio.pause();
    playing = false;
  } else {
    audio.play();
    playing = true;
  }
}

/* 🔥 RECONEXIÓN AUTOMÁTICA */
audio.addEventListener("error", reconnect);
audio.addEventListener("stalled", reconnect);
audio.addEventListener("ended", reconnect);

function reconnect(){
  if(currentUrl){
    console.log("Reconectando...");
    setTimeout(()=>{
      audio.src = currentUrl;
      audio.load();
      audio.play();
    },2000);
  }
}
</script>

</body>
</html>
