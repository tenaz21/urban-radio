<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Radio Perú</title>

<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* LOGO */
.logo{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff0000,#ffd000,#00ff66,#00c3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SEARCH */
.search{
  width:90%;
  margin:auto;
  display:block;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#181818;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
  padding-bottom:180px;
}

.card{
  background:#181818;
  padding:15px;
  border-radius:15px;
  text-align:center;
  position:relative;
}

.card:hover{
  background:#ff0055;
}

.fav{
  position:absolute;
  top:5px;
  right:10px;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

.cover{
  width:50px;
  border-radius:10px;
}

.row{
  display:flex;
  align-items:center;
  gap:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:5px;
}

button{
  background:#00ff66;
  border:none;
  padding:10px;
  border-radius:50%;
}

input[type=range]{
  width:100%;
}
</style>
</head>

<body>

<div class="logo">🎧 URBAN RADIO PERÚ 🇵🇪</div>

<input class="search" id="search" placeholder="Buscar...">

<div class="grid" id="grid"></div>

<div class="grid" id="songs"></div>

<div class="player">

<div class="row">
<img id="cover" class="cover" src="https://via.placeholder.com/50">
<div id="title">Nada sonando</div>
</div>

<input type="range" id="progress" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>

<input type="range" id="volume" min="0" max="1" step="0.01">

<audio id="audio"></audio>

</div>

<script>

/* DATOS */
const radios=[
{name:"LOS40",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3"},
{name:"RPP",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/RPP_SC"},
{name:"Exitosa",url:"https://cu.onliv3.com/live/exitosa.mp3"}
];

const canciones=[
{name:"Hip Hop Beat",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{name:"LoFi Chill",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
{name:"Rap Flow",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
];

let lista=[...radios,...canciones];
let index=0;

const grid=document.getElementById("grid");
const songs=document.getElementById("songs");
const audio=document.getElementById("audio");
const title=document.getElementById("title");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");
const volume=document.getElementById("volume");

/* LOGO */
function logo(n){
 return "https://ui-avatars.com/api/?name="+n;
}

/* PLAY */
function play(i){
 index=i;
 const item=lista[i];
 audio.src=item.url;
 audio.play();
 title.textContent=item.name;
 cover.src=logo(item.name);
}

/* CONTROLES */
function toggle(){
 audio.paused?audio.play():audio.pause();
}

function next(){
 index++;
 if(index>=lista.length) index=0;
 play(index);
}

function prev(){
 index--;
 if(index<0) index=lista.length-1;
 play(index);
}

/* PROGRESO */
audio.ontimeupdate=()=>{
 if(audio.duration){
  progress.value=(audio.currentTime/audio.duration)*100;
 }
};

progress.oninput=()=>{
 audio.currentTime=(progress.value/100)*audio.duration;
};

/* VOLUMEN */
volume.oninput=()=>{
 audio.volume=volume.value;
};

/* RENDER */
function render(){
 lista.forEach((r,i)=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<p>${r.name}</p>`;
  d.onclick=()=>play(i);
  grid.appendChild(d);
 });
}

render();

/* BUSCAR */
search.oninput=e=>{
 const t=e.target.value.toLowerCase();
 grid.innerHTML="";
 lista.filter(r=>r.name.toLowerCase().includes(t)).forEach((r,i)=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<p>${r.name}</p>`;
  d.onclick=()=>play(i);
  grid.appendChild(d);
 });
};

/* PWA */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
