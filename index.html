<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flow Perú</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
  padding-bottom:120px;
}

.title{
  text-align:center;
  font-size:24px;
  padding:15px;
  background:linear-gradient(90deg,#ff0000,#ffd000,#00ff66);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#181818;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-family:'Rubik Mono One';
  cursor:pointer;
}

/* GENEROS */
.genres{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:10px;
}

.genre{
  padding:10px 15px;
  background:#181818;
  border-radius:20px;
  white-space:nowrap;
}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
}

button{
  background:#00ff88;
  border:none;
  padding:12px;
  border-radius:50%;
  font-size:18px;
}

.active{
  outline:2px solid #00ff88;
}
</style>
</head>

<body>

<div class="title">🎧 URBAN FLOW PERÚ 🇵🇪</div>

<!-- GENEROS -->
<div class="genres">
<div class="genre">Pop</div>
<div class="genre">Urbano</div>
<div class="genre">Electrónica</div>
<div class="genre">Romántica</div>
</div>

<!-- RADIOS -->
<div class="grid" id="radios"></div>

<!-- PLAYLIST -->
<div class="title">🎵 Playlist</div>
<div class="grid" id="playlist"></div>

<!-- PLAYER -->
<div class="player">
<div id="titlePlayer">Nada sonando</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button id="playBtn" onclick="toggle()">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>

/* RADIOS (FUNCIONALES) */
const radios=[
{name:"LOS40",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40.mp3"},
{name:"La Zona",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/LAZONA_SC"},
{name:"Moda",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/MODA_SC"},
{name:"Oxígeno",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/OXIGENO_SC"},
{name:"Disney",url:"https://playerservices.streamtheworld.com/api/livestream-redirect/DISNEY_SC"}
];

/* PLAYLIST */
const canciones=[
{name:"Hip Hop Beat",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
{name:"LoFi Chill",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
{name:"Rap Flow",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
];

let lista=[...radios,...canciones];
let index=0;

const audio=document.getElementById("audio");
const title=document.getElementById("titlePlayer");
const playBtn=document.getElementById("playBtn");

/* RENDER RADIOS */
const rCont=document.getElementById("radios");

radios.forEach((r,i)=>{
 let d=document.createElement("div");
 d.className="card";
 d.innerText=r.name;
 d.onclick=()=>play(i,d);
 rCont.appendChild(d);
});

/* RENDER PLAYLIST */
const pCont=document.getElementById("playlist");

canciones.forEach((c,i)=>{
 let d=document.createElement("div");
 d.className="card";
 d.innerText=c.name;
 d.onclick=()=>play(i+radios.length,d);
 pCont.appendChild(d);
});

/* PLAY */
function play(i,el){
 index=i;
 audio.src=lista[i].url;
 audio.play();
 title.innerText=lista[i].name;

 document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
 if(el) el.classList.add("active");

 playBtn.innerText="⏸";
}

/* TOGGLE */
function toggle(){
 if(audio.paused){
  audio.play();
  playBtn.innerText="⏸";
 }else{
  audio.pause();
  playBtn.innerText="▶";
 }
}

/* NEXT / PREV */
function next(){
 index=(index+1)%lista.length;
 play(index);
}

function prev(){
 index=(index-1+lista.length)%lista.length;
 play(index);
}

/* CUANDO TERMINA */
audio.onended=()=>{
 next();
};

</script>

</body>
</html>
